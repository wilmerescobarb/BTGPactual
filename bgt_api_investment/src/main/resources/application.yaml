spring:
  application:
    name: bgt_api_investment

  mongodb:
    uri: ${SPRING_MONGODB_URI}
    database: ${SPRING_MONGODB_DATABASE}

server:
  port: 8082

jwt:
  # Debe coincidir exactamente con el secret de bgt_api_auth
  secret: ${JWT_SECRET:bgt-super-secret-key-for-jwt-signing-2026}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}

logging:
  level:
    com.ceiba.bgt_api_investment: INFO