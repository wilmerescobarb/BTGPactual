spring:
  application:
    name: bgt_api_notification
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_EMAIL:}
    password: ${GOOGLE_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
server:
  port: 8083
app:
  mail:
    from: ${SPRING_MAIL_USERNAME:wilmer.escobar@ceiba.com.co}

aws:
  access-key: ${AWS_ACCESS_KEY:}
  secret-key: ${AWS_SECRET_KEY:}
  region: ${AWS_REGION:us-east-1}

jwt:
  # Debe coincidir exactamente con el secret de bgt_api_auth
  secret: ${JWT_SECRET:bgt-super-secret-key-for-jwt-signing-2026}

logging:
  level:
    com.ceiba.bgt_api_notification: INFO
