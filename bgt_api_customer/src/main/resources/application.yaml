spring:
  application:
    name: bgt_api_customer

  data:
    mongodb:
      uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017}}
      database: bgt_db

server:
  port: 8084

jwt:
  # Debe coincidir exactamente con el secret de bgt_api_auth
  secret: ${JWT_SECRET:bgt-super-secret-key-for-jwt-signing-2026}

logging:
  level:
    com.ceiba.bgt_api_customer: INFO
