spring:
  application:
    name: bgt_api_auth

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/bgt_db
    username: postgres
    password: postgres1
    pool:
      enabled: true
      initial-size: 5
      max-size: 10
      max-idle-time: 30m

server:
  port: 8081

jwt:
  # Clave secreta para firmar JWTs (mínimo 32 caracteres para HS256)
  secret: bgt-super-secret-key-for-jwt-signing-2024
  # Tiempo de expiración del token en milisegundos (1 hora = 3600000)
  expiration-ms: 3600000
