spring:
  application:
    name: bgt_api_auth

  mongodb:
    uri: ${SPRING_MONGODB_URI}
    database: ${SPRING_MONGODB_DATABASE}

server:
  port: 8081

jwt:
  # Clave secreta para firmar JWTs (mínimo 32 caracteres para HS256)
  secret: ${JWT_SECRET:bgt-super-secret-key-for-jwt-signing-2026}
  # Tiempo de expiración del token en milisegundos (1 hora = 3600000)
  expiration-ms: 3600000

logging:
  level:
    com.ceiba.bgt_api_auth: INFO